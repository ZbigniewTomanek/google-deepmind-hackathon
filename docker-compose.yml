x-common-env: &common-env
  NEOCORTEX_MOCK_DB: "false"
  NEOCORTEX_AUTH_MODE: "dev_token"
  NEOCORTEX_DEV_TOKENS_FILE: "/app/dev_tokens.json"
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: neocortex
  POSTGRES_PASSWORD: neocortex
  POSTGRES_DATABASE: neocortex

services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: neocortex-postgres
    environment:
      POSTGRES_DB: neocortex
      POSTGRES_USER: neocortex
      POSTGRES_PASSWORD: neocortex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neocortex -d neocortex"]
      interval: 5s
      timeout: 3s
      retries: 5

  neocortex-mcp:
    build:
      context: .
      dockerfile: docker/mcp/Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      NEOCORTEX_TRANSPORT: http
      NEOCORTEX_SERVER_HOST: "0.0.0.0"
    volumes:
      - ./dev_tokens.json:/app/dev_tokens.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  neocortex-ingestion:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
    volumes:
      - ./dev_tokens.json:/app/dev_tokens.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
