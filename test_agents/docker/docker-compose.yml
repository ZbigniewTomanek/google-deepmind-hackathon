# Docker Compose for NeoCortex Test Agents
# Separate from the main project's docker-compose.yml
#
# Services:
#   - opencode-web: OpenCode web UI (port 4098)
#   - agent-api: Test agents FastAPI (port 8003)
#
# No postgres — agents use the NeoCortex MCP server on localhost:8000
# Start the main project's services first: docker compose up -d postgres neocortex-mcp
#
# All opencode state lives inside test_agents/build/:
#   build/.opencode/agents/   — compiled agent definitions
#   build/.opencode/data/     — opencode DB, logs, sessions
#   build/opencode.json       — provider/model config
#   build/.git                — marks build/ as project root for opencode

x-common-env: &common-env
  HOME: /home/appuser
  XDG_DATA_HOME: ${PROJECT_ROOT}/test_agents/build/.opencode/data
  XDG_CONFIG_HOME: ${PROJECT_ROOT}/test_agents/build/.opencode_config
  UV_PROJECT_ENVIRONMENT: /tmp/.venv

services:
  opencode-web:
    container_name: testagents-opencode-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    network_mode: host
    volumes:
      - ${PROJECT_ROOT}:${PROJECT_ROOT}
      - ${OPENCODE_BIN:-${HOME}/.opencode/bin/opencode}:/usr/local/bin/opencode:ro
    environment:
      <<: *common-env
    env_file:
      - ../.env
    working_dir: ${PROJECT_ROOT}/test_agents/build
    command: >
      sh -c "cd ${PROJECT_ROOT} &&
             uv sync &&
             cd test_agents &&
             uv run python build_agents.py &&
             cd build &&
             opencode web --hostname 0.0.0.0 --port 4098"
    restart: unless-stopped

  agent-api:
    container_name: testagents-agent-api
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    network_mode: host
    volumes:
      - ${PROJECT_ROOT}:${PROJECT_ROOT}
      - ${OPENCODE_BIN:-${HOME}/.opencode/bin/opencode}:/usr/local/bin/opencode:ro
    environment:
      <<: *common-env
    env_file:
      - ../.env
    working_dir: ${PROJECT_ROOT}/test_agents
    command: >
      sh -c "cd ${PROJECT_ROOT} &&
             uv sync &&
             cd test_agents &&
             uv run python run.py"
    depends_on:
      opencode-web:
        condition: service_started
    restart: unless-stopped
