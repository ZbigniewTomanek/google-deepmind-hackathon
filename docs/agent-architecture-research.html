<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NeoCortex — Example Ingestion Pipeline</title>
<style>
  body { margin: 0; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<svg viewBox="0 0 1100 820" width="1100" height="820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="aw" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ecdc4"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
    <marker id="ad" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd93d"/>
    </marker>
    <marker id="am" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sh">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#e0e0e0" font-size="26" font-weight="bold">Example Ingestion Pipeline</text>
  <text x="550" y="62" text-anchor="middle" fill="#777" font-size="13">Concurrent multimodal processing of video, audio &amp; RSS into shared knowledge graph</text>

  <!-- ============ STAGE RUNNER ============ -->
  <rect x="40" y="100" width="200" height="65" rx="8" fill="#2a2a1f" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#sh)"/>
  <text x="140" y="127" text-anchor="middle" fill="#bbb" font-size="14" font-weight="bold">run_parallel.sh</text>
  <text x="140" y="148" text-anchor="middle" fill="#888" font-size="11">copies all media to /app/input</text>

  <!-- /app/input -->
  <rect x="320" y="92" width="200" height="80" rx="8" fill="#3d2e1f" stroke="#ffd93d" stroke-width="2" filter="url(#sh)"/>
  <rect x="320" y="92" width="200" height="3" rx="2" fill="#ffd93d"/>
  <text x="420" y="122" text-anchor="middle" fill="#ffd93d" font-size="15" font-weight="bold">/app/input</text>
  <text x="420" y="142" text-anchor="middle" fill="#c4a83d" font-size="11">.mp4  .mp3  .rss</text>
  <text x="420" y="160" text-anchor="middle" fill="#a08830" font-size="10">mounted Docker volume</text>

  <!-- runner → input -->
  <line x1="240" y1="132" x2="318" y2="132" stroke="#888" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="278" y="125" fill="#888" font-size="9">cp</text>

  <!-- ============ RESEARCH ORCHESTRATOR ============ -->
  <circle cx="550" cy="260" r="62" fill="#2a1f3d" stroke="#ff6b9d" stroke-width="3" filter="url(#glow)"/>
  <text x="550" y="248" text-anchor="middle" fill="#ff6b9d" font-size="13" font-weight="bold">Research</text>
  <text x="550" y="266" text-anchor="middle" fill="#ff6b9d" font-size="13" font-weight="bold">Orchestrator</text>
  <text x="550" y="286" text-anchor="middle" fill="#c05577" font-size="10">primary agent</text>

  <!-- input → orchestrator -->
  <line x1="440" y1="172" x2="520" y2="204" stroke="#ffd93d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ad)"/>
  <text x="465" y="180" fill="#ffd93d" font-size="9">list-input-files</text>

  <!-- ============ SUBAGENTS ============ -->

  <!-- Video Processor -->
  <circle cx="220" cy="440" r="52" fill="#1f2a3d" stroke="#4ecdc4" stroke-width="2.5" filter="url(#glow)"/>
  <text x="220" y="428" text-anchor="middle" fill="#4ecdc4" font-size="12" font-weight="bold">Video</text>
  <text x="220" y="445" text-anchor="middle" fill="#4ecdc4" font-size="12" font-weight="bold">Processor</text>
  <text x="220" y="465" text-anchor="middle" fill="#3a9c96" font-size="9">subagent</text>
  <text x="220" y="505" text-anchor="middle" fill="#2d7a75" font-size="8">transcribe-local-video</text>
  <text x="220" y="517" text-anchor="middle" fill="#2d7a75" font-size="8">video-screenshot</text>

  <!-- Audio Processor -->
  <circle cx="550" cy="440" r="52" fill="#1f2a3d" stroke="#4ecdc4" stroke-width="2.5" filter="url(#glow)"/>
  <text x="550" y="428" text-anchor="middle" fill="#4ecdc4" font-size="12" font-weight="bold">Audio</text>
  <text x="550" y="445" text-anchor="middle" fill="#4ecdc4" font-size="12" font-weight="bold">Processor</text>
  <text x="550" y="465" text-anchor="middle" fill="#3a9c96" font-size="9">subagent</text>
  <text x="550" y="505" text-anchor="middle" fill="#2d7a75" font-size="8">transcribe-local-audio</text>

  <!-- RSS Processor -->
  <circle cx="880" cy="440" r="52" fill="#1f2a3d" stroke="#4ecdc4" stroke-width="2.5" filter="url(#glow)"/>
  <text x="880" y="428" text-anchor="middle" fill="#4ecdc4" font-size="12" font-weight="bold">RSS</text>
  <text x="880" y="445" text-anchor="middle" fill="#4ecdc4" font-size="12" font-weight="bold">Processor</text>
  <text x="880" y="465" text-anchor="middle" fill="#3a9c96" font-size="9">subagent</text>
  <text x="880" y="505" text-anchor="middle" fill="#2d7a75" font-size="8">parse-local-rss</text>

  <!-- Orchestrator → Video -->
  <line x1="495" y1="295" x2="265" y2="405" stroke="#ffd93d" stroke-width="2.5" marker-end="url(#ad)"/>
  <text x="350" y="340" fill="#ffd93d" font-size="11" font-weight="bold">.mp4 .webm</text>

  <!-- Orchestrator → Audio -->
  <line x1="550" y1="322" x2="550" y2="386" stroke="#ffd93d" stroke-width="2.5" marker-end="url(#ad)"/>
  <text x="565" y="358" fill="#ffd93d" font-size="11" font-weight="bold">.mp3 .wav</text>

  <!-- Orchestrator → RSS -->
  <line x1="605" y1="295" x2="835" y2="405" stroke="#ffd93d" stroke-width="2.5" marker-end="url(#ad)"/>
  <text x="745" y="340" fill="#ffd93d" font-size="11" font-weight="bold">.rss .xml</text>

  <!-- ============ SHARED RESEARCH GRAPH ============ -->
  <rect x="310" y="590" width="320" height="110" rx="10" fill="#1e3a5f" stroke="#4ecdc4" stroke-width="3" filter="url(#sh)"/>
  <rect x="310" y="590" width="320" height="5" rx="3" fill="#4ecdc4"/>
  <text x="470" y="628" text-anchor="middle" fill="#4ecdc4" font-size="18" font-weight="bold">ncx_shared__research</text>
  <text x="470" y="650" text-anchor="middle" fill="#8cb8d0" font-size="12">Shared Knowledge Graph (PostgreSQL)</text>
  <text x="470" y="670" text-anchor="middle" fill="#6a9ab5" font-size="11">Episodes + Nodes + Edges</text>
  <text x="470" y="688" text-anchor="middle" fill="#557a8f" font-size="10">target_graph="ncx_shared__research"</text>

  <!-- Video → Shared Graph -->
  <path d="M 240 490 Q 240 560 340 600" fill="none" stroke="#4ecdc4" stroke-width="2.5" marker-end="url(#aw)"/>
  <text x="245" y="555" fill="#4ecdc4" font-size="10" font-weight="bold">remember()</text>

  <!-- Audio → Shared Graph -->
  <line x1="550" y1="492" x2="500" y2="588" stroke="#4ecdc4" stroke-width="2.5" marker-end="url(#aw)"/>
  <text x="540" y="545" fill="#4ecdc4" font-size="10" font-weight="bold">remember()</text>

  <!-- RSS → Shared Graph -->
  <path d="M 860 490 Q 860 560 610 600" fill="none" stroke="#4ecdc4" stroke-width="2.5" marker-end="url(#aw)"/>
  <text x="770" y="555" fill="#4ecdc4" font-size="10" font-weight="bold">remember()</text>

  <!-- ============ CHAT WITH EXTRACTIONS ============ -->
  <circle cx="850" cy="640" r="58" fill="#2d1f1f" stroke="#ff6b35" stroke-width="3" filter="url(#glow)"/>
  <text x="850" y="625" text-anchor="middle" fill="#ff6b35" font-size="12" font-weight="bold">Chat With</text>
  <text x="850" y="643" text-anchor="middle" fill="#ff6b35" font-size="12" font-weight="bold">Extractions</text>
  <text x="850" y="663" text-anchor="middle" fill="#c05528" font-size="10">primary agent</text>
  <text x="850" y="680" text-anchor="middle" fill="#994420" font-size="8">queries all research data</text>

  <!-- Shared Graph → Chat Extractions -->
  <line x1="632" y1="640" x2="790" y2="640" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#ar)"/>
  <text x="710" y="632" fill="#ff6b6b" font-size="10" font-weight="bold">recall() / discover()</text>

  <!-- Personal graph for chat-extractions -->
  <rect x="920" y="540" width="160" height="55" rx="6" fill="#2d1f3d" stroke="#a78bfa" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="920" y="540" width="160" height="3" rx="2" fill="#a78bfa"/>
  <text x="1000" y="567" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">Personal Graph</text>
  <text x="1000" y="583" text-anchor="middle" fill="#9580b5" font-size="9">conversation insights</text>

  <!-- Chat Extractions → Personal -->
  <line x1="880" y1="590" x2="920" y2="575" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#am)"/>

  <!-- ============ MCP SERVER ============ -->
  <rect x="300" y="740" width="340" height="60" rx="8" fill="#1f2d1f" stroke="#6bff6b" stroke-width="2" filter="url(#sh)"/>
  <rect x="300" y="740" width="340" height="3" rx="2" fill="#6bff6b"/>
  <text x="470" y="768" text-anchor="middle" fill="#6bff6b" font-size="14" font-weight="bold">NeoCortex MCP Server :8000</text>
  <text x="470" y="786" text-anchor="middle" fill="#5ab85a" font-size="10">Auth via Bearer tokens | Async extraction pipeline</text>

  <!-- Faint lines to MCP -->
  <line x1="240" y1="492" x2="370" y2="740" stroke="#6bff6b" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.3"/>
  <line x1="550" y1="492" x2="470" y2="740" stroke="#6bff6b" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.3"/>
  <line x1="860" y1="492" x2="570" y2="740" stroke="#6bff6b" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.3"/>
  <line x1="850" y1="698" x2="600" y2="740" stroke="#6bff6b" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.3"/>

  <!-- ============ AUTH TOKENS (small badges) ============ -->
  <rect x="148" y="525" width="145" height="18" rx="9" fill="#1a3035" stroke="#3a9c96" stroke-width="1"/>
  <text x="220" y="538" text-anchor="middle" fill="#3a9c96" font-size="9">video-processor-token</text>

  <rect x="478" y="515" width="145" height="18" rx="9" fill="#1a3035" stroke="#3a9c96" stroke-width="1"/>
  <text x="550" y="528" text-anchor="middle" fill="#3a9c96" font-size="9">audio-processor-token</text>

  <rect x="808" y="515" width="145" height="18" rx="9" fill="#1a3035" stroke="#3a9c96" stroke-width="1"/>
  <text x="880" y="528" text-anchor="middle" fill="#3a9c96" font-size="9">rss-processor-token</text>

  <rect x="770" y="700" width="160" height="18" rx="9" fill="#2d1a1a" stroke="#c05528" stroke-width="1"/>
  <text x="850" y="713" text-anchor="middle" fill="#c05528" font-size="9">chat-extractions-token</text>

  <!-- ============ LEGEND ============ -->
  <rect x="30" y="730" width="240" height="80" rx="6" fill="#222240" stroke="#555" stroke-width="1"/>
  <text x="48" y="750" fill="#ccc" font-size="12" font-weight="bold">Legend</text>

  <circle cx="48" cy="768" r="7" fill="none" stroke="#ff6b9d" stroke-width="1.5"/>
  <text x="62" y="772" fill="#aaa" font-size="10">Agent</text>

  <rect x="41" y="782" width="14" height="10" rx="2" fill="none" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="62" y="792" fill="#aaa" font-size="10">Memory Store</text>

  <line x1="115" y1="768" x2="133" y2="768" stroke="#4ecdc4" stroke-width="2" marker-end="url(#aw)"/>
  <text x="140" y="772" fill="#4ecdc4" font-size="10">Write</text>

  <line x1="115" y1="788" x2="133" y2="788" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="140" y="792" fill="#ff6b6b" font-size="10">Read</text>

  <line x1="190" y1="768" x2="208" y2="768" stroke="#ffd93d" stroke-width="2" marker-end="url(#ad)"/>
  <text x="215" y="772" fill="#ffd93d" font-size="10">Route</text>

  <!-- Concurrent badge -->
  <rect x="700" y="92" width="160" height="45" rx="8" fill="#1a2a1a" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="780" y="112" text-anchor="middle" fill="#4ecdc4" font-size="11" font-weight="bold">Concurrent</text>
  <text x="780" y="128" text-anchor="middle" fill="#3a9c96" font-size="10">all 3 run in parallel</text>

</svg>
</body>
</html>
