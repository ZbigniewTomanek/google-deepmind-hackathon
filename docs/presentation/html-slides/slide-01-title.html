<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
html { background: #04081A; }
body {
  width: 720pt;
  height: 405pt;
  margin: 0;
  padding: 0;
  background: #04081A;
  font-family: 'Outfit', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ── Horizontal rules ── */
.rule-top {
  position: absolute;
  top: 44pt;
  left: 80pt;
  right: 80pt;
  height: 1pt;
  background: rgba(157, 110, 247, 0.4);
}
.rule-bottom {
  position: absolute;
  bottom: 52pt;
  left: 80pt;
  right: 80pt;
  height: 1pt;
  background: rgba(157, 110, 247, 0.4);
}

/* ── Rule terminator nodes ── */
.rule-dot {
  position: absolute;
  width: 7pt;
  height: 7pt;
  border-radius: 50%;
  background: rgba(157, 110, 247, 0.35);
}

/* ── Graph nodes ── */
.node {
  position: absolute;
  border-radius: 50%;
}

/* ── Typography ── */
.title-block {
  text-align: center;
  z-index: 1;
  margin-top: -12pt;
}

h1 {
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  color: #E8E4DC;
  font-size: 44pt;
  font-weight: 400;
  letter-spacing: 0.35em;
  margin: 0 0 14pt 0;
  text-transform: uppercase;
}

.subtitle {
  font-family: 'Outfit', Arial, sans-serif;
  color: #9D6EF7;
  font-size: 17pt;
  font-weight: 300;
  margin: 0;
  letter-spacing: 0.06em;
}

.team-line {
  font-family: 'Outfit', Arial, sans-serif;
  color: #C8A84E;
  font-size: 11pt;
  font-weight: 400;
  letter-spacing: 0.05em;
  margin: 0;
  position: absolute;
  bottom: 86pt;
  left: 0;
  right: 0;
  text-align: center;
}

.event-line {
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  color: #6B5B95;
  font-size: 10pt;
  font-weight: 400;
  letter-spacing: 0.08em;
  margin: 0;
  position: absolute;
  bottom: 66pt;
  left: 0;
  right: 0;
  text-align: center;
}
</style>
</head>
<body>

  <!-- ── Horizontal rules ── -->
  <div class="rule-top"></div>
  <div class="rule-bottom"></div>

  <!-- Rule terminators -->
  <div class="rule-dot" style="top: 41pt; left: 76.5pt;"></div>
  <div class="rule-dot" style="top: 41pt; right: 76.5pt;"></div>
  <div class="rule-dot" style="bottom: 49pt; left: 76.5pt;"></div>
  <div class="rule-dot" style="bottom: 49pt; right: 76.5pt;"></div>

  <!-- ═══════════════════════════════════════════════════
       GRAPH NODES — tight pairs & triplets imply edges
       ═══════════════════════════════════════════════════ -->

  <!-- LEFT UPPER TRIPLET — the primary anchor cluster -->
  <div class="node" style="left: 86pt;  top: 80pt;  width: 11pt; height: 11pt; background: rgba(62, 207, 160, 0.50); box-shadow: 0 0 12px 4px rgba(62, 207, 160, 0.18);"></div>
  <div class="node" style="left: 113pt; top: 70pt;  width: 5pt;  height: 5pt;  background: rgba(157, 110, 247, 0.40);"></div>
  <div class="node" style="left: 108pt; top: 100pt; width: 6pt;  height: 6pt;  background: rgba(200, 168, 78, 0.35);"></div>

  <div class="node" style="left: 60pt;  top: 170pt; width: 7pt;  height: 7pt;  background: rgba(157, 110, 247, 0.30); box-shadow: 0 0 8px 3px rgba(157, 110, 247, 0.10);"></div>
  <div class="node" style="left: 78pt;  top: 186pt; width: 4pt;  height: 4pt;  background: rgba(62, 207, 160, 0.22);"></div>

  <!-- LEFT LOWER PAIR -->
  <div class="node" style="left: 82pt;  top: 272pt; width: 8pt;  height: 8pt;  background: rgba(62, 207, 160, 0.30); box-shadow: 0 0 8px 3px rgba(62, 207, 160, 0.10);"></div>
  <div class="node" style="left: 106pt; top: 265pt; width: 4pt;  height: 4pt;  background: rgba(107, 91, 149, 0.25);"></div>

  <!-- RIGHT UPPER QUAD — secondary anchor cluster -->
  <div class="node" style="left: 615pt; top: 78pt;  width: 10pt; height: 10pt; background: rgba(157, 110, 247, 0.45); box-shadow: 0 0 12px 4px rgba(157, 110, 247, 0.16);"></div>
  <div class="node" style="left: 640pt; top: 70pt;  width: 5pt;  height: 5pt;  background: rgba(62, 207, 160, 0.35);"></div>
  <div class="node" style="left: 598pt; top: 100pt; width: 5pt;  height: 5pt;  background: rgba(200, 168, 78, 0.30);"></div>
  <div class="node" style="left: 642pt; top: 96pt;  width: 4pt;  height: 4pt;  background: rgba(107, 91, 149, 0.28);"></div>

  <!-- RIGHT MID PAIR -->
  <div class="node" style="left: 650pt; top: 168pt; width: 6pt;  height: 6pt;  background: rgba(62, 207, 160, 0.28); box-shadow: 0 0 8px 3px rgba(62, 207, 160, 0.08);"></div>
  <div class="node" style="left: 638pt; top: 186pt; width: 4pt;  height: 4pt;  background: rgba(157, 110, 247, 0.20);"></div>

  <!-- RIGHT LOWER -->
  <div class="node" style="left: 624pt; top: 275pt; width: 7pt;  height: 7pt;  background: rgba(107, 91, 149, 0.25); box-shadow: 0 0 6px 2px rgba(107, 91, 149, 0.08);"></div>
  <div class="node" style="left: 645pt; top: 282pt; width: 4pt;  height: 4pt;  background: rgba(62, 207, 160, 0.18);"></div>

  <!-- DUST — barely-there depth particles -->
  <div class="node" style="left: 46pt;  top: 225pt; width: 3pt;  height: 3pt;  background: rgba(62, 207, 160, 0.10);"></div>
  <div class="node" style="left: 672pt; top: 220pt; width: 3pt;  height: 3pt;  background: rgba(157, 110, 247, 0.10);"></div>
  <div class="node" style="left: 168pt; top: 138pt; width: 3pt;  height: 3pt;  background: rgba(107, 91, 149, 0.08);"></div>
  <div class="node" style="left: 548pt; top: 135pt; width: 3pt;  height: 3pt;  background: rgba(107, 91, 149, 0.08);"></div>
  <div class="node" style="left: 200pt; top: 305pt; width: 2pt;  height: 2pt;  background: rgba(200, 168, 78, 0.07);"></div>
  <div class="node" style="left: 520pt; top: 310pt; width: 2pt;  height: 2pt;  background: rgba(62, 207, 160, 0.07);"></div>

  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Main content -->
  <div class="title-block">
    <h1>NeoCortex</h1>
    <p class="subtitle">Structured Memory for AI Agents</p>
  </div>

  <p class="team-line">Zbigniew Tomanek</p>
  <p class="event-line">Google DeepMind x AI Tinkerers Hackathon  //  Warsaw 2026</p>

</body>
</html>
